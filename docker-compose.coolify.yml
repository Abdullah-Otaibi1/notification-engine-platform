# Notification Engine Platform - Coolify deployment
# Target: Coolify v4.1.2+ / Docker Compose v2
#
# Important:
# - Keep all services in the Coolify-managed network. Do not add custom networks.
# - Do not publish PostgreSQL or Backend ports to the host.
# - In Coolify, assign the public domain/IP only to the frontend service on port 80.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nep_user}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_64_POSTGRES}
      POSTGRES_DB: ${POSTGRES_DB:-nep_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -h 127.0.0.1 -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    shm_size: "128mb"
    stop_grace_period: 30s
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-nep_user}:${SERVICE_PASSWORD_64_POSTGRES}@postgres:5432/${POSTGRES_DB:-nep_db}?schema=public
      DB_HOST: postgres
      DB_PORT: "5432"
      JWT_SECRET: ${SERVICE_HEX_64_JWT}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      # Same-origin via the nginx proxy in production, so CORS is typically
      # irrelevant. Set CORS_ORIGIN in Coolify only for split-domain/direct API
      # access (comma-separated allow-list). No hardcoded infra IP fallback.
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      # Seeding is opt-in. Set RUN_SEED=true (+ SEED_*_PASSWORD) for first bootstrap.
      RUN_SEED: ${RUN_SEED:-false}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_OPS_PASSWORD: ${SEED_OPS_PASSWORD:-}
      SEED_AUDITOR_PASSWORD: ${SEED_AUDITOR_PASSWORD:-}
      SEED_VIEWER_PASSWORD: ${SEED_VIEWER_PASSWORD:-}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:3000/api/health')
          .then((response) => process.exit(response.status < 500 ? 0 : 1))
          .catch(() => process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s
    stop_grace_period: 30s
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1/ || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    stop_grace_period: 10s
    logging: *default-logging

volumes:
  postgres_data:
